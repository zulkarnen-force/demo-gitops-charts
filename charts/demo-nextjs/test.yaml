      name: http
  selector:
    app.kubernetes.io/name: demo-nextjs
    app.kubernetes.io/instance: demo
---
# Source: demo-nextjs/templates/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: demo-demo-nextjs
  labels:
    helm.sh/chart: demo-nextjs-0.1.0
    app.kubernetes.io/name: demo-nextjs
    app.kubernetes.io/instance: demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm
spec:
  replicas: 1

  selector:
    matchLabels:
      app.kubernetes.io/name: demo-nextjs
      app.kubernetes.io/instance: demo

  template:
    metadata:
      labels:
        app.kubernetes.io/name: demo-nextjs
        app.kubernetes.io/instance: demo
      annotations:
        checksum/config: 982d06e89507a92b06387855221980b7482aad31778af9744999487155aa593d
        checksum/secret: 3901a923cd05edc7b41922f7f285ab74d97f684a42f6233ef78e5f59ccdccb6b
    spec:
      serviceAccountName: demo-demo-nextjs
      securityContext:
        null
      containers:
        - name: demo-nextjs
          image: "zulkarnen/lgtm-demo:latest"
          imagePullPolicy: IfNotPresent
          securityContext:
            null
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          envFrom:
            - configMapRef:
                name: demo-demo-nextjs
            - secretRef:
                name: demo-demo-nextjs
          readinessProbe:
            httpGet:
              path: /api/health
              port: http

            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3

          livenessProbe:

            httpGet:
              path: /api/health
              port: http

            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3

          startupProbe:

            httpGet:
              path: /api/health
              port: http

            periodSeconds: 5
            failureThreshold: 30

          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 256Mi

      terminationGracePeriodSeconds: 30
---
# Source: demo-nextjs/templates/ingress.yaml
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: demo-demo-nextjs
  labels:
    helm.sh/chart: demo-nextjs-0.1.0
    app.kubernetes.io/name: demo-nextjs
    app.kubernetes.io/instance: demo
    app.kubernetes.io/version: "1.0.0"
    app.kubernetes.io/managed-by: Helm

spec:
  ingressClassName: traefik

  rules:

    - host: "demo.local"

      http:

        paths:

          - path: /

            pathType: Prefix

            backend:

              service:

                name: demo-demo-nextjs

                port:

                  number: 3000
